<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stowaway - Discover Free Books</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Serif Pro', serif;
            background: linear-gradient(135deg, #0a3a66 0%, #1565a0 50%, #0d47a1 100%);
            min-height: 100vh;
            color: #e3f2fd;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(66, 165, 245, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(25, 118, 210, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: drift 20s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }

        .logo-svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 4px 15px rgba(66, 165, 245, 0.3));
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #42a5f5;
            margin-bottom: 12px;
            text-shadow: 0 4px 20px rgba(66, 165, 245, 0.3);
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Search Section */
        .search-section {
            background: rgba(13, 71, 161, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(66, 165, 245, 0.4);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(25, 118, 210, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            background: rgba(13, 71, 161, 0.5);
            border: 2px solid rgba(66, 165, 245, 0.4);
            border-radius: 10px;
            color: #e3f2fd;
            font-size: 1rem;
            font-family: 'Source Serif Pro', serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #42a5f5;
            background: rgba(13, 71, 161, 0.8);
            box-shadow: 0 0 20px rgba(66, 165, 245, 0.4);
        }

        button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Source Serif Pro', serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(66, 165, 245, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        select {
            padding: 12px 16px;
            background: rgba(13, 71, 161, 0.5);
            border: 2px solid rgba(66, 165, 245, 0.4);
            border-radius: 10px;
            color: #e3f2fd;
            font-family: 'Source Serif Pro', serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #42a5f5;
            background: rgba(13, 71, 161, 0.8);
        }

        select option {
            background: #0d47a1;
            color: #e3f2fd;
        }

        /* Results Section */
        .results-section {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(66, 165, 245, 0.3);
        }

        .results-count {
            font-size: 1.1rem;
            color: #b3e5fc;
        }

        .results-count strong {
            color: #42a5f5;
            font-weight: 600;
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .book-card {
            background: rgba(13, 71, 161, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(66, 165, 245, 0.3);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out backwards;
        }

        .book-card:nth-child(1) { animation-delay: 0.1s; }
        .book-card:nth-child(2) { animation-delay: 0.2s; }
        .book-card:nth-child(3) { animation-delay: 0.3s; }
        .book-card:nth-child(n+4) { animation-delay: 0.4s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .book-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 165, 245, 0.2), transparent);
            transition: left 0.5s;
        }

        .book-card:hover::before {
            left: 100%;
        }

        .book-card:hover {
            border-color: #42a5f5;
            background: rgba(13, 71, 161, 0.6);
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(66, 165, 245, 0.3);
        }

        .book-cover {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(66, 165, 245, 0.2);
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #b3e5fc;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .book-author {
            color: #81d4fa;
            font-size: 0.95rem;
            margin-bottom: 12px;
            font-style: italic;
        }

        .book-description {
            color: #90caf9;
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.6;
            min-height: 60px;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid rgba(66, 165, 245, 0.2);
            margin-bottom: 12px;
        }

        .book-source {
            display: inline-block;
            background: rgba(66, 165, 245, 0.3);
            color: #42a5f5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            background: rgba(66, 165, 245, 0.2);
            border: 1px solid #42a5f5;
            color: #42a5f5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .download-btn:hover {
            background: #1976d2;
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #81d4fa;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .empty-state-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #81d4fa;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(66, 165, 245, 0.2);
            border-top-color: #42a5f5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Info Box */
        .info-box {
            background: rgba(25, 118, 210, 0.2);
            border-left: 4px solid #1976d2;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            color: #b3e5fc;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .info-box strong {
            color: #42a5f5;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .search-section {
                padding: 24px;
            }

            .search-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .filter-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="logo-svg" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
                    <!-- Anchor shaft -->
                    <line x1="100" y1="20" x2="100" y2="140" stroke="#42a5f5" stroke-width="8" stroke-linecap="round"/>
                    
                    <!-- Left flukes made of books -->
                    <g id="left-fluke">
                        <!-- Book 1 - Top left -->
                        <rect x="40" y="120" width="35" height="50" rx="3" fill="#1976d2" stroke="#42a5f5" stroke-width="2"/>
                        <line x1="40" y1="135" x2="75" y2="135" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        <line x1="40" y1="150" x2="75" y2="150" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        
                        <!-- Book 2 - Bottom left -->
                        <rect x="30" y="160" width="40" height="45" rx="3" fill="#0d47a1" stroke="#42a5f5" stroke-width="2"/>
                        <line x1="30" y1="175" x2="70" y2="175" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        <line x1="30" y1="190" x2="70" y2="190" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                    </g>
                    
                    <!-- Right flukes made of books -->
                    <g id="right-fluke">
                        <!-- Book 3 - Top right -->
                        <rect x="125" y="120" width="35" height="50" rx="3" fill="#1976d2" stroke="#42a5f5" stroke-width="2"/>
                        <line x1="125" y1="135" x2="160" y2="135" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        <line x1="125" y1="150" x2="160" y2="150" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        
                        <!-- Book 4 - Bottom right -->
                        <rect x="130" y="160" width="40" height="45" rx="3" fill="#0d47a1" stroke="#42a5f5" stroke-width="2"/>
                        <line x1="130" y1="175" x2="170" y2="175" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                        <line x1="130" y1="190" x2="170" y2="190" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
                    </g>
                    
                    <!-- Eye of the anchor (circle at top) -->
                    <circle cx="100" cy="25" r="8" fill="#42a5f5" stroke="#81d4fa" stroke-width="2"/>
                    
                    <!-- Decorative wave at bottom -->
                    <path d="M 50 220 Q 75 210 100 220 T 150 220" stroke="#42a5f5" stroke-width="2" fill="none" opacity="0.7"/>
                </svg>
                <div class="logo">Stowaway</div>
            </div>
            <div class="tagline">Your Secret Passage to Free Books</div>
        </header>

        <div class="search-section">
            <div class="info-box">
                💡 <strong>Pro Tip:</strong> Search by book title, author name, or genre. Browse popular libraries like Project Gutenberg, Standard Ebooks, and Open Library for free, legal EPUBs.
            </div>

            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search book title or author..." 
                    autocomplete="off"
                >
                <button onclick="searchBooks()">Search</button>
            </div>

            <div class="filter-row">
                <select id="sourceFilter">
                    <option value="">All Sources</option>
                    <option value="gutenberg">Project Gutenberg</option>
                    <option value="standard">Standard Ebooks</option>
                    <option value="openlibrary">Open Library</option>
                    <option value="oceansofpdf">Oceans of PDF</option>
                    <option value="librivox">Librivox (Audio)</option>
                    <option value="manybooks">ManyBooks</option>
                </select>
                <select id="genreFilter">
                    <option value="">All Genres</option>
                    <option value="fiction">Fiction</option>
                    <option value="mystery">Mystery</option>
                    <option value="science-fiction">Science Fiction</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="romance">Romance</option>
                    <option value="non-fiction">Non-Fiction</option>
                    <option value="classics">Classics</option>
                </select>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-text">Start Your Search</div>
                <div class="empty-state-subtext">Search for a book title or author to find free EPUB versions</div>
            </div>
        </div>
    </div>

    <script>
        // Sample book database with popular free books
        const bookDatabase = [
            {
                title: "Pride and Prejudice",
                author: "Jane Austen",
                description: "A romantic novel set in Georgian England following the spirited Elizabeth Bennet.",
                source: "Project Gutenberg",
                genre: "fiction",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/1342",
                cover: "https://images.unsplash.com/photo-1544716278-ca5e3cff5d8c?w=400&h=600&fit=crop"
            },
            {
                title: "The Great Gatsby",
                author: "F. Scott Fitzgerald",
                description: "A classic American novel exploring themes of wealth, love, and the American Dream.",
                source: "Project Gutenberg",
                genre: "classics",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/4300",
                cover: "https://images.unsplash.com/photo-1507842217343-583f20270fbb?w=400&h=600&fit=crop"
            },
            {
                title: "Jane Eyre",
                author: "Charlotte Brontë",
                description: "A gothic romance novel following an orphaned girl's journey to find love and independence.",
                source: "Standard Ebooks",
                genre: "romance",
                sourceFilter: "standard",
                url: "https://standardebooks.org/ebooks/charlotte-bronte/jane-eyre",
                cover: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400&h=600&fit=crop"
            },
            {
                title: "Sherlock Holmes: A Study in Scarlet",
                author: "Arthur Conan Doyle",
                description: "The first appearance of the world's most famous detective and his chronicles.",
                source: "Project Gutenberg",
                genre: "mystery",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/244",
                cover: "https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=400&h=600&fit=crop"
            },
            {
                title: "The Time Machine",
                author: "H.G. Wells",
                description: "A science fiction novella about a man who invents a machine to travel through time.",
                source: "Standard Ebooks",
                genre: "science-fiction",
                sourceFilter: "standard",
                url: "https://standardebooks.org/ebooks/h-g-wells/the-time-machine",
                cover: "https://images.unsplash.com/photo-1536375072455-38d40b6be77f?w=400&h=600&fit=crop"
            },
            {
                title: "Alice's Adventures in Wonderland",
                author: "Lewis Carroll",
                description: "A fantastical tale of a young girl's adventures in a magical, surreal world.",
                source: "Project Gutenberg",
                genre: "fantasy",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/11",
                cover: "https://images.unsplash.com/photo-1557683311-51a6fb3a1232?w=400&h=600&fit=crop"
            },
            {
                title: "Frankenstein",
                author: "Mary Shelley",
                description: "A gothic science fiction novel about a scientist who creates a living creature from dead body parts.",
                source: "Standard Ebooks",
                genre: "science-fiction",
                sourceFilter: "standard",
                url: "https://standardebooks.org/ebooks/mary-shelley/frankenstein",
                cover: "https://images.unsplash.com/photo-1536779160443-9b74b285bb3f?w=400&h=600&fit=crop"
            },
            {
                title: "The Murders in the Rue Morgue",
                author: "Edgar Allan Poe",
                description: "Often considered the first modern detective story, featuring C. Auguste Dupin.",
                source: "Project Gutenberg",
                genre: "mystery",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/1845",
                cover: "https://images.unsplash.com/photo-1516979187457-635ffe35b50b?w=400&h=600&fit=crop"
            },
            {
                title: "Wuthering Heights",
                author: "Emily Brontë",
                description: "A dark romantic novel set on the Yorkshire moors exploring passion and revenge.",
                source: "Open Library",
                genre: "romance",
                sourceFilter: "openlibrary",
                url: "https://openlibrary.org/books/OL1429699M/Wuthering_Heights",
                cover: "https://images.unsplash.com/photo-1519904981063-b0cf448d479e?w=400&h=600&fit=crop"
            },
            {
                title: "Journey to the Center of the Earth",
                author: "Jules Verne",
                description: "An adventure novel following a professor and his nephew's incredible journey underground.",
                source: "Project Gutenberg",
                genre: "science-fiction",
                sourceFilter: "gutenberg",
                url: "https://www.gutenberg.org/ebooks/3062",
                cover: "https://images.unsplash.com/photo-1495446815901-a7297e3ffe02?w=400&h=600&fit=crop"
            },
            {
                title: "The Midnight Library",
                author: "Matt Haig",
                description: "A woman between life and death explores parallel versions of her life in an infinite library.",
                source: "Oceans of PDF",
                genre: "fiction",
                sourceFilter: "oceansofpdf",
                url: "https://oceansofpdf.com",
                cover: "https://images.unsplash.com/photo-1542759762-2c82c37d19c5?w=400&h=600&fit=crop"
            },
            {
                title: "Atomic Habits",
                author: "James Clear",
                description: "A practical guide to building good habits and breaking bad ones through tiny changes.",
                source: "Oceans of PDF",
                genre: "non-fiction",
                sourceFilter: "oceansofpdf",
                url: "https://oceansofpdf.com",
                cover: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=600&fit=crop"
            },
            {
                title: "The Silent Patient",
                author: "Alex Michaelides",
                description: "A psychological thriller about a woman who shoots her husband and then never speaks again.",
                source: "Oceans of PDF",
                genre: "mystery",
                sourceFilter: "oceansofpdf",
                url: "https://oceansofpdf.com",
                cover: "https://images.unsplash.com/photo-1507842217343-583f20270fbb?w=400&h=600&fit=crop"
            }
        ];

        let currentResults = [];

        function searchBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const source = document.getElementById('sourceFilter').value;
            const genre = document.getElementById('genreFilter').value;

            if (!query && !source && !genre) {
                alert('Please enter a search term or select a filter');
                return;
            }

            currentResults = bookDatabase.filter(book => {
                const matchesQuery = !query || 
                    book.title.toLowerCase().includes(query) || 
                    book.author.toLowerCase().includes(query);
                
                const matchesSource = !source || book.sourceFilter === source;
                const matchesGenre = !genre || book.genre === genre;

                return matchesQuery && matchesSource && matchesGenre;
            });

            displayResults();
        }

        function displayResults() {
            const resultsSection = document.getElementById('resultsSection');

            if (currentResults.length === 0) {
                resultsSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">No Books Found</div>
                        <div class="empty-state-subtext">Try a different search term or adjust your filters</div>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="results-header">
                    <div class="results-count">Found <strong>${currentResults.length}</strong> book(s)</div>
                </div>
                <div class="books-grid">
            `;

            currentResults.forEach(book => {
                html += `
                    <div class="book-card">
                        <img src="${book.cover}" alt="${book.title}" class="book-cover" onerror="this.src='https://via.placeholder.com/400x600?text=${encodeURIComponent(book.title)}'">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">by ${book.author}</div>
                        <div class="book-description">${book.description}</div>
                        <div class="book-meta">
                            <span class="book-source">${book.source}</span>
                        </div>
                        <button class="download-btn" onclick="openBook('${book.url}')">
                            View & Download
                        </button>
                    </div>
                `;
            });

            html += '</div>';
            resultsSection.innerHTML = html;
        }

        function openBook(url) {
            window.open(url, '_blank');
        }

        // Allow search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchBooks();
            }
        });

        // Auto-search when filters change
        document.getElementById('sourceFilter').addEventListener('change', searchBooks);
